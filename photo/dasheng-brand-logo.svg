<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 760" role="img" aria-labelledby="title desc">
  <title id="title">Dasheng Brand Logo</title>
  <desc id="desc">Original red monkey flame mark for auto-install-Openclaw branding.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a0004"/>
      <stop offset="1" stop-color="#090001"/>
    </linearGradient>
    <linearGradient id="fire" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff4a4a"/>
      <stop offset="1" stop-color="#a80012"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff7d7d"/>
      <stop offset="1" stop-color="#d10018"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="640" height="760" fill="url(#bg)"/>

  <g transform="translate(320,290)" filter="url(#glow)">
    <path d="M0-220 L178-120 L178 100 L0 208 L-178 100 L-178-120 Z" fill="none" stroke="url(#line)" stroke-width="16"/>
    <path d="M-88 70 C-120 40 -136 -8 -96 -46 C-90 -84 -67 -113 -32 -128 C-20 -164 4 -181 30 -170 C62 -142 78 -103 68 -58 C96 -27 95 12 65 44 C56 95 24 126 -25 132 C-48 128 -75 114 -88 70 Z" fill="url(#fire)" stroke="#ff8d8d" stroke-width="8"/>
    <path d="M-56 -4 C-45 -34 -20 -48 0 -49 C20 -49 45 -34 56 -4 C46 34 24 56 0 57 C-24 56 -46 34 -56 -4 Z" fill="#300006" stroke="#ff6b6b" stroke-width="7"/>
    <ellipse cx="-24" cy="-2" rx="12" ry="9" fill="#ff2c2c"/>
    <ellipse cx="24" cy="-2" rx="12" ry="9" fill="#ff2c2c"/>
    <path d="M-26 60 C-18 48 18 48 26 60 C17 79 -17 79 -26 60 Z" fill="#190002" stroke="#ff5555" stroke-width="5"/>
  </g>

  <g fill="#ff2b2b" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="320" y="650" font-size="74" font-weight="700">Monkey King's</text>
    <text x="320" y="706" font-size="46" font-weight="700">Wrath</text>
  </g>
</svg>
